name: Build TitleTrackCpp

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libwxgtk3.0-gtk3-dev libsqlite3-dev cmake

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install wxwidgets sqlite cmake

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install sqlite
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'
          choco install wxwidgets

      - name: Configure project
        run: |
          mkdir build
          cd build
          cmake ..

      - name: Build project
        run: |
          cd build
          cmake --build .
