name: Build TitleTrackCpp

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  build-linux:
    name: Build on Ubuntu
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y cmake build-essential libsqlite3-dev libwxgtk3.2-dev

    - name: Configure with CMake
      run: cmake -S . -B build

    - name: Build
      run: cmake --build build --config Release

  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      shell: bash
      run: |
        choco install -y cmake sqlite wxwidgets

    - name: List wxWidgets directories (debug)
      run: |
          dir C:\wxWidgets-3.1.2\include
          dir C:\wxWidgets-3.1.2\lib\vc_x64_lib

    - name: Configure with CMake
    
      run: |
        # Set WXWIN to the Chocolatey wxWidgets install location
        $env:WXWIN="C:\wxWidgets-3.1.2"
        cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
        -DwxWidgets_ROOT_DIR="$env:WXWIN" `
        -DwxWidgets_LIB_DIR="$env:WXWIN\lib\vc_x64_lib" `
        -DwxWidgets_CONFIGURATION=mswu `
        -DwxWidgets_DEBUG=1
        
    - name: Build
      run: cmake --build build --config Release
