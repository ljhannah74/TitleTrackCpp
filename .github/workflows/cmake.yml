name: Build TitleTrackCpp

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  build-linux:
    name: Build on Ubuntu
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y cmake build-essential libsqlite3-dev libwxgtk3.0-gtk3-dev

    - name: Configure with CMake
      run: cmake -S . -B build

    - name: Build
      run: cmake --build build --config Release

  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      shell: bash
      run: |
        choco install -y cmake sqlite wxwidgets

    - name: Configure with CMake
      run: cmake -S . -B build

    - name: Build
      run: cmake --build build --config Release
